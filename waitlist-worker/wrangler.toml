name = "content-repurposer-waitlist"
main = "index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "WAITLIST_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

# Secrets (set via: wrangler secret put NOTIFY_EMAIL)
# NOTIFY_EMAIL = "your-email@gmail.com"    — where to receive signup notifications
# ADMIN_SECRET = "your-secret-key"         — for /list endpoint auth
